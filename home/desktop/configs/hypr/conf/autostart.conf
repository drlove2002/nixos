#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = systemctl --user start hyprpolkitagent
exec-once = $HOME/.local/bin/hypr-session-init
exec-once = pidof hyprpaper || hyprpaper
exec-once = pidof hyprsunset || hyprsunset
exec-once = pidof hypridle || hypridle
exec-once = qs -n -c overview
exec-once = pidof eww || eww daemon
exec-once = ~/.local/bin/projects --restore
exec-once = [workspace 2 silent] zen-beta --profile $HOME/.config/zen/love
